name: Windows Release

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Dependencies
        working-directory: novadl
        run: flutter pub get
      - name: Stage bundled yt-dlp and ffmpeg
        working-directory: novadl
        shell: pwsh
        run: ./scripts/fetch_dependencies.ps1
      - name: Analyze
        working-directory: novadl
        run: flutter analyze
      - name: Test
        working-directory: novadl
        run: flutter test
      - name: Build Windows
        working-directory: novadl
        run: flutter build windows --release
      - name: Portable artifact
        shell: pwsh
        working-directory: novadl
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath NovaDL-Portable.zip
      - uses: actions/upload-artifact@v4
        with:
          name: NovaDL-Windows
          path: |
            novadl/build/windows/x64/runner/Release/**
            novadl/NovaDL-Portable.zip
