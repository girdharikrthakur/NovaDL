name: novadl
description: NovaDL, a Windows-first yt-dlp desktop manager built with Flutter.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  bitsdojo_window: ^0.1.6
  collection: ^1.19.1
  crypto: ^3.0.6
  dio: ^5.8.0+1
  equatable: ^2.0.7
  file_picker: ^10.1.9
  flutter_animate: ^4.5.2
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^3.0.0
  go_router: ^15.1.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  logging: ^1.3.0
  path: ^1.9.1
  path_provider: ^2.1.5
  rxdart: ^0.28.0
  sqlite3_flutter_libs: ^0.5.32
  sqlite3: ^2.7.6
  tray_manager: ^0.5.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^3.0.6
  json_serializable: ^6.9.5
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
